<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SEEN — Eau de Parfum</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://www.paypal.com/sdk/js?client-id=sb&currency=EUR"></script>

<style>

body{
font-family:Inter;
margin:0;
background:#ffffff;
color:#111;
}

.header{
text-align:center;
padding:60px 20px;
}

.hero img{
width:100%;
max-width:600px;
display:block;
margin:auto;
}

.section{
max-width:900px;
margin:auto;
padding:60px 20px;
text-align:center;
}

.products{
display:flex;
gap:40px;
justify-content:center;
flex-wrap:wrap;
}

.product{
width:250px;
}

.product img{
width:100%;
}

button{
background:black;
color:white;
border:none;
padding:12px 18px;
margin-top:10px;
cursor:pointer;
}

.cart{
position:fixed;
right:20px;
top:20px;
background:white;
border:1px solid #ddd;
padding:20px;
width:260px;
}

.cart h3{
margin-top:0;
}

.cart-item{
display:flex;
justify-content:space-between;
margin:10px 0;
}

.checkout{
margin-top:20px;
}

footer{
text-align:center;
padding:40px;
}

</style>
</head>

<body>

<header class="header">
<h1>SEEN</h1>
<p>Presence before words.</p>
</header>

<section class="hero">
<img src="https://i.postimg.cc/Y0XZLHdK/IMG-7992.png">
</section>

<section class="section">

<h2>The Scent</h2>

<p>
A composition built on restraint and balance.
SEEN unfolds quietly, leaving a subtle yet lasting presence.
</p>

</section>

<section class="section shop">

<h2>Shop</h2>

<div class="products">

<div class="product">

<img src="https://i.postimg.cc/0QNfPL7j/2BDB92CF_6AA1_4ED5_A9FC_45E56E423F5B.jpg">

<p>SEEN Dark — 50ml</p>
<p>30€</p>

<button onclick="addToCart('SEEN Dark',30)">Add to Cart</button>

</div>

<div class="product">

<img src="https://i.postimg.cc/k45cqkWC/9B3F511E_15D9_49A0_AC45_7D88F83014EA.jpg">

<p>SEEN Light — 50ml</p>
<p>30€</p>

<button onclick="addToCart('SEEN Light',30)">Add to Cart</button>

</div>

</div>

</section>

<div class="cart">

<h3>Cart</h3>

<div id="cart-items"></div>

<p>Total: €<span id="total">0</span></p>

<div id="paypal-button-container" class="checkout"></div>

</div>

<footer>

<a href="https://www.instagram.com/seenfragrance/" target="_blank">Instagram</a>

<br><br>

<a href="mailto:oceandeu@gmail.com">Email</a>

</footer>

<script>

let cart = [];

function addToCart(name, price){

let item = cart.find(i => i.name === name);

if(item){
item.qty += 1;
}else{
cart.push({name, price, qty:1});
}

renderCart();

}

function renderCart(){

let container = document.getElementById("cart-items");
container.innerHTML = "";

let total = 0;

cart.forEach(item=>{

let div = document.createElement("div");

div.className="cart-item";

div.innerHTML = `${item.name} x${item.qty} <span>€${item.price*item.qty}</span>`;

container.appendChild(div);

total += item.price * item.qty;

});

document.getElementById("total").innerText = total;

}

paypal.Buttons({

createOrder:function(data,actions){

let total = cart.reduce((sum,item)=>sum+(item.price*item.qty),0);

return actions.order.create({

purchase_units:[{

amount:{
value: total.toFixed(2)
}

}]

});

},

onApprove:function(data,actions){

return actions.order.capture().then(function(details){

alert("Payment completed by " + details.payer.name.given_name);

cart=[];
renderCart();

});

}

}).render("#paypal-button-container");

</script>

</body>

</html>
