<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SEEN — Eau de Parfum</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://www.paypal.com/sdk/js?client-id=sb&currency=EUR"></script>

<style>

body{
font-family:Inter,sans-serif;
margin:0;
color:#111;
background:#fff;
}

header{
text-align:center;
padding:70px 20px;
}

header h1{
letter-spacing:6px;
font-weight:500;
}

.hero img{
display:block;
margin:auto;
max-width:520px;
width:90%;
}

.section{
max-width:900px;
margin:auto;
padding:80px 20px;
text-align:center;
}

.products{
display:flex;
justify-content:center;
gap:60px;
flex-wrap:wrap;
}

.product{
width:240px;
}

.product img{
width:100%;
}

.product button{
margin-top:12px;
padding:10px 16px;
border:1px solid black;
background:white;
cursor:pointer;
}

.product button:hover{
background:black;
color:white;
}

.cart-icon{
position:fixed;
top:25px;
right:25px;
font-size:18px;
cursor:pointer;
}

.cart-panel{

position:fixed;
right:-420px;
top:0;

width:360px;
height:100%;

background:white;

box-shadow:-4px 0 15px rgba(0,0,0,0.1);

padding:30px;

transition:.35s;

overflow:auto;
}

.cart-panel.open{
right:0;
}

.cart-item{
display:flex;
justify-content:space-between;
margin:15px 0;
}

.total{
margin-top:20px;
font-weight:500;
}

.checkout{
margin-top:30px;
}

footer{
text-align:center;
padding:60px;
}

</style>

</head>

<body>

<div class="cart-icon" onclick="toggleCart()">
🛒 Cart
</div>

<header>

<h1>SEEN</h1>
<p>Presence before words.</p>

</header>

<section class="hero">

<img src="https://i.postimg.cc/Y0XZLHdK/IMG-7992.png">

</section>

<section class="section">

<h2>The Scent</h2>

<p>
A composition built on restraint and balance.  
SEEN unfolds quietly, leaving a subtle yet lasting presence.
</p>

</section>

<section class="section">

<h2>Shop</h2>

<div class="products">

<div class="product">

<img src="https://i.postimg.cc/0QNfPL7j/2BDB92CF_6AA1_4ED5_A9FC_45E56E423F5B.jpg">

<p>SEEN — Dark</p>
<p>50ml — 30€</p>

<button onclick="addToCart('SEEN Dark',30)">Add to Cart</button>

</div>

<div class="product">

<img src="https://i.postimg.cc/k45cqkWC/9B3F511E_15D9_49A0_AC45_7D88F83014EA.jpg">

<p>SEEN — Light</p>
<p>50ml — 30€</p>

<button onclick="addToCart('SEEN Light',30)">Add to Cart</button>

</div>

</div>

</section>

<div class="cart-panel" id="cart">

<h2>Cart</h2>

<div id="cart-items"></div>

<p class="total">
Total: €<span id="total">0</span>
</p>

<div id="paypal-button-container" class="checkout"></div>

</div>

<footer>

<a href="https://www.instagram.com/seenfragrance/">Instagram</a>
<br><br>
<a href="mailto:oceandeu@gmail.com">Email</a>

</footer>

<script>

let cart=[];

function toggleCart(){
document.getElementById("cart").classList.toggle("open");
}

function addToCart(name,price){

let item=cart.find(i=>i.name===name);

if(item){
item.qty++;
}else{
cart.push({name,price,qty:1});
}

renderCart();

}

function renderCart(){

let container=document.getElementById("cart-items");
container.innerHTML="";

let total=0;

cart.forEach(item=>{

let div=document.createElement("div");

div.className="cart-item";

div.innerHTML=`${item.name} x${item.qty} <span>€${item.qty*item.price}</span>`;

container.appendChild(div);

total+=item.price*item.qty;

});

document.getElementById("total").innerText=total;

}

paypal.Buttons({

createOrder:function(data,actions){

let total=cart.reduce((sum,i)=>sum+i.price*i.qty,0);

return actions.order.create({

purchase_units:[{

amount:{
value: total.toFixed(2)
}

}]

});

},

onApprove:function(data,actions){

return actions.order.capture().then(function(details){

alert("Payment successful");

cart=[];

renderCart();

});

}

}).render("#paypal-button-container");

</script>

</body>
</html>
